<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Srija | 26.05</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        :root { --flower-pink: #FF85A1; --soft-pink: #FFE5EC; --yes-green: #2ecc71; --no-red: #e74c3c; }
        body { background: linear-gradient(135deg, #FFDEE9 0%, #B5FFFC 100%); font-family: 'Nunito', sans-serif; margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; touch-action: manipulation; }
        
        .petal { position: fixed; background-color: #ffb7c5; border-radius: 150% 0 150% 0; z-index: 0; opacity: 0.6; pointer-events: none; animation: fall linear infinite; }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); } 100% { transform: translateY(110vh) rotate(360deg); } }
        .star { position: fixed; width: 4px; height: 4px; background: white; border-radius: 50%; box-shadow: 0 0 10px white; z-index: 5; pointer-events: auto; display: none; }

        .container { text-align: center; width: 90%; max-width: 500px; padding: 50px 0; position: relative; z-index: 1; }
        .bear-wrapper { position: relative; display: inline-block; cursor: pointer; padding: 30px; z-index: 100; transition: transform 0.4s ease; }
        .bear-main { font-size: 9rem; filter: drop-shadow(0 15px 25px rgba(255, 133, 161, 0.3)); pointer-events: none; }
        .tap-hint { font-family: 'Fredoka One', cursive; color: white; background: var(--flower-pink); padding: 12px 25px; border-radius: 50px; animation: bounce 1.5s infinite; margin-bottom: 20px; display: inline-block; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        #proposal-box { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 40px 20px; border-radius: 30px; z-index: 10000; width: 85%; max-width: 380px; border: 5px solid var(--flower-pink); box-shadow: 0 0 100px rgba(0,0,0,0.2); }
        #main-gift { display: none; background: rgba(255, 255, 255, 0.98); padding: 40px 25px; border-radius: 35px; width: 100%; box-sizing: border-box; box-shadow: 0 20px 60px rgba(0,0,0,0.1); border: 4px solid white; }
        
        /* Counter Styling */
        .counter-box { background: var(--soft-pink); padding: 15px; border-radius: 20px; border: 2px solid var(--flower-pink); margin-bottom: 25px; }
        .counter-number { font-family: 'Fredoka One', cursive; font-size: 2rem; color: var(--flower-pink); display: block; }
        .counter-label { font-family: 'Pacifico'; font-size: 1rem; color: #8B5A2B; }

        .shimmer-btn { background: var(--flower-pink); color: white; border: none; padding: 15px 25px; border-radius: 50px; font-family: 'Fredoka One', cursive; cursor: pointer; margin: 10px 0; transition: 0.3s; box-shadow: 0 5px 15px rgba(255, 133, 161, 0.4); }
        .polaroid { background: white; padding: 15px 15px 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin: 35px 0; }
        .polaroid img { width: 100%; filter: blur(25px); transition: 2s ease; }
        .revealed img { filter: blur(0); }
        .coupon { background: #fff; border: 2px dashed #FF85A1; border-radius: 20px; margin: 20px 0; padding: 20px; box-shadow: 6px 6px 0px #FF85A1; }
        .trail { position: fixed; pointer-events: none; z-index: 9999; animation: fadeOut 1.2s forwards; font-size: 1.5rem; }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; transform: scale(2.5) translateY(-60px); } }
    </style>
</head>
<body onclick="spawnHeart(event)">
    <div id="petals-container"></div>
    <div id="shooting-star" class="star" onclick="makeWish()"></div>
    <audio id="bgMusic" loop><source src="Apocalypse - Cigarettes After Sex.mp3" type="audio/mpeg"></audio>

    <div class="container">
        <div id="landing">
            <div id="hint-text" class="tap-hint">Catch the Bear, Srija! 🧸✨</div><br>
            <div class="bear-wrapper" id="naughtyBear" onclick="naughtyNudge()"><div class="bear-main">🧸</div></div>
            <h2 style="font-family: 'Pacifico'; color: white;">For the most beautiful girl...</h2>
        </div>

        <div id="main-gift">
            <div class="counter-box">
                <span class="counter-label">Days you have been loved by Tish:</span>
                <span class="counter-number" id="loveCounter">0</span>
            </div>

            <button class="shimmer-btn" style="width:100%;" id="musicBtn" onclick="toggleMusic()">🎵 Play Our Song</button>
            <h1 style="font-family: 'Pacifico'; color: var(--flower-pink);">Happy Birthday, Srija... 🌸</h1>
            <div id="typewriter" style="text-align: left; line-height: 1.8; color: #444; font-size: 1.1rem; white-space: pre-wrap;"></div>
            <div id="gallery" style="display:none;">
                <div class="polaroid" style="transform: rotate(-2deg);" onclick="this.classList.add('revealed')"><img src="IMG20250926125707.jpg"><p style="font-family: 'Pacifico'; color: #999;">Our Times 🌷</p></div>
                <div class="polaroid" style="transform: rotate(2deg);" onclick="this.classList.add('revealed')"><img src="IMG20251210124535.jpg"><p style="font-family: 'Pacifico'; color: #999;">My Everything 🌹</p></div>
                <div style="margin-top: 40px; border-top: 2px dashed #FF85A1; padding-top: 20px;">
                    <p style="font-family: 'Pacifico'; color: #8B5A2B;">Birthday Promises... 🎟️</p>
                    <div class="coupon"><b>🎟️ Infinite Hug</b><br><button class="shimmer-btn" style="padding:5px 15px;" onclick="alert('Locked in! ❤️')">Redeem</button></div>
                    <div class="coupon"><b>🥤 Cold Drink Date</b><br><button class="shimmer-btn" style="padding:5px 15px;" onclick="alert('I owe you! 🥤')">Redeem</button></div>
                </div>
                <button class="shimmer-btn" style="width:100%;" onclick="checkDate()">One last secret... 🤫</button>
            </div>
        </div>
    </div>

    <div id="proposal-box">
        <h2 style="font-family: 'Pacifico'; color: var(--flower-pink);">Do you love me? 🥰</h2>
        <div style="position: relative; height: 160px;">
            <button class="shimmer-btn" id="yes-btn" style="background: var(--yes-green); position: absolute; left: 10px; width: 110px;" onclick="startGift()">A) Yes</button>
            <button class="shimmer-btn" id="no-btn" style="background: var(--no-red); position: absolute; right: 10px; width: 110px;" onmouseover="dodgeNo()" ontouchstart="dodgeNo()">B) No</button>
        </div>
    </div>

    <script>
        const letter = `My Dearest Srija,\n\nEvery second since June 2024, you’ve been the only thought in my head. You are the peace I find at the end of a long day. \n\nI hope your day is as stunning as you are and filled with your favorite cold drinks 🥤. I'm counting every day until I can give you a real rose in person.\n\nWith all my soul,\nTrishit (Tish) ❤️`;
        const music = document.getElementById('bgMusic');
        let nudges = 0;

        // Love Counter Logic
        function updateCounter() {
            const startDate = new Date('2024-06-30'); // Start date 30 June 2024
            const today = new Date();
            const timeDiff = today - startDate;
            const daysDiff = Math.floor(timeDiff / (1000 * 60 * 60 * 24));
            document.getElementById('loveCounter').innerHTML = daysDiff;
        }

        for (let i = 0; i < 15; i++) {
            const p = document.createElement('div'); p.className='petal'; p.style.left=Math.random()*100+'vw'; p.style.width=Math.random()*15+10+'px'; p.style.height=p.style.width; p.style.animationDuration=Math.random()*3+5+'s'; document.getElementById('petals-container').appendChild(p);
        }

        function naughtyNudge() {
            const b = document.getElementById('naughtyBear'); const h = document.getElementById('hint-text'); nudges++;
            if(nudges==1){ b.style.transform="translateX(-110px)"; h.innerHTML="Too slow! 😜"; }
            else if(nudges==2){ b.style.transform="translateX(110px)"; h.innerHTML="Almost! 🤣"; }
            else { b.style.transform="translateX(0)"; h.innerHTML="You win! 🥰"; setTimeout(() => { document.getElementById('landing').style.display='none'; document.getElementById('proposal-box').style.display='block'; }, 800); }
        }

        function dodgeNo() {
            const btn = document.getElementById('no-btn'); const box = document.getElementById('proposal-box');
            btn.style.left = Math.random()*(box.clientWidth-120)+'px'; btn.style.top = Math.random()*(box.clientHeight-100)+60+'px'; btn.innerHTML="Nope! 🏃‍♂️";
        }

        function startGift() {
            if (navigator.vibrate) { navigator.vibrate([200, 100, 200]); }
            document.getElementById('proposal-box').style.display = 'none'; document.getElementById('main-gift').style.display = 'block';
            updateCounter(); // Initialize counter when gift opens
            music.play();
            let i = 0; const c = document.getElementById('typewriter');
            function type() { if(i < letter.length){ c.innerHTML += letter.charAt(i); i++; setTimeout(type, 50); } else { document.getElementById('gallery').style.display='block'; } }
            type();
        }

        function makeWish() { alert("✨ A wish made for Srija always comes true. ❤️"); document.getElementById('shooting-star').style.display='none'; }
        
        setInterval(() => {
            const s = document.getElementById('shooting-star'); s.style.display='block'; s.style.left='-50px'; s.style.top=Math.random()*50+'vh';
            s.animate([{left: '-50px', top: s.style.top}, {left: '110vw', top: '100vh'}], {duration: 2000});
            setTimeout(() => s.style.display='none', 2000);
        }, 30000);

        function spawnHeart(e) {
            const h = document.createElement('div'); h.className='trail'; h.innerHTML='❤️';
            const x = e.clientX || (e.touches && e.touches[0].clientX); const y = e.clientY || (e.touches && e.touches[0].clientY);
            h.style.left=x+'px'; h.style.top=y+'px'; document.body.appendChild(h); setTimeout(()=>h.remove(),1000);
        }

        function toggleMusic() { if(music.paused){ music.play(); } else { music.pause(); } }
        
        function checkDate() { 
            const d = new Date(); 
            if(d.getMonth()===4 && d.getDate()===26) { 
                alert("Complimenting her that in her eyes i wass seing our beloved future and bright together everyday form june 2024. Khash tui oidin amake boltis ba khash tui boltis keno u ignored me hoyeto bhojale what caused you trouble ba keu hoyeto toke bolechilo ba tui nijei korli eram ei sobh jodhi tui discuss korte partis and surely amra soln petam tahole amraaa akhun eksatheii thaktam ekher r opor er songee and yahhh dhure giyeo i loveee youu alott u are still my favourite girl but yah 🥹 joddhi tui amake sotti eii boltis sobh and jodhi tui nijer r bhul bhuje sorry bole ditis tahole bishash kor ami khussi khussi abar tor kache chole jetam as ur tish 😍anywaysss happy birthday loveeee ajkher r din tah jenoo tor khubbb sundorrr khateeee and Yahh i lovee you onektaaa"); 
            } else { 
                alert("Wait until May 26th! 🧸"); 
            } 
        }
    </script>
</body>
</html>
