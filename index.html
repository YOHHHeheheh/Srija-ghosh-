<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Srija | 26.05</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        :root { --flower-pink: #FF85A1; --soft-pink: #FFE5EC; --yes-green: #2ecc71; --no-red: #e74c3c; --star-gold: #FFF07C; --cherry-red: #8B0000; }
        body { background: linear-gradient(135deg, #FFDEE9 0%, #B5FFFC 100%); font-family: 'Nunito', sans-serif; margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; touch-action: manipulation; }
        
        /* CHERRY RED PASSWORD WALL STYLE */
        #password-gate {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #ffccd5 0%, #fff0f3 100%);
            z-index: 999999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        .pass-box {
            background: white;
            padding: 35px 25px;
            border-radius: 30px;
            border: 5px solid var(--cherry-red);
            box-shadow: 0 15px 35px rgba(139, 0, 0, 0.25);
            width: 85%;
            max-width: 340px;
        }
        .pass-input {
            width: 85%;
            padding: 12px 15px;
            border: 2px solid #ffb3c1;
            border-radius: 25px;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            margin-bottom: 15px;
            font-family: 'Nunito', sans-serif;
            transition: 0.3s;
            letter-spacing: 1px;
        }
        .pass-input:focus {
            border-color: var(--cherry-red);
            box-shadow: 0 0 10px rgba(139, 0, 0, 0.2);
        }
        .error-msg {
            color: var(--cherry-red);
            font-size: 0.95rem;
            margin-top: 12px;
            display: none;
            font-weight: bold;
            line-height: 1.4;
            background: #fff0f3;
            padding: 10px;
            border-radius: 15px;
            border: 1px dashed var(--cherry-red);
        }
        .cherry-btn {
            background: var(--cherry-red); 
            color: white; 
            border: none; 
            padding: 15px 25px; 
            border-radius: 50px; 
            font-family: 'Fredoka One', cursive; 
            cursor: pointer; 
            margin: 0; 
            transition: 0.3s; 
            box-shadow: 0 5px 15px rgba(139, 0, 0, 0.4);
            width: 85%;
        }
        .cherry-btn:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        /* Petals */
        .petal { position: fixed; background-color: #ffb7c5; border-radius: 150% 0 150% 0; z-index: 0; opacity: 0.6; pointer-events: none; animation: fall linear infinite; }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); } 100% { transform: translateY(110vh) rotate(360deg); } }
        
        /* BIG GLOWING STAR */
        .star { 
            position: fixed; 
            width: 15px; 
            height: 15px; 
            background: var(--star-gold); 
            border-radius: 50%; 
            box-shadow: 0 0 30px var(--star-gold), 0 0 60px white; 
            z-index: 20000; 
            pointer-events: auto; 
            display: none; 
        }
        .star::after { 
            content: ''; 
            position: absolute; 
            top: 50%; 
            right: 0; 
            width: 180px; 
            height: 6px; 
            background: linear-gradient(to left, var(--star-gold), transparent); 
            transform: translateY(-50%); 
            border-radius: 100px; 
        }

        .container { text-align: center; width: 90%; max-width: 500px; padding: 50px 0; position: relative; z-index: 1; }
        .bear-wrapper { position: relative; display: inline-block; cursor: pointer; padding: 30px; z-index: 100; transition: transform 0.4s ease; }
        .bear-main { font-size: 9rem; filter: drop-shadow(0 15px 25px rgba(255, 133, 161, 0.3)); pointer-events: none; }
        .tap-hint { font-family: 'Fredoka One', cursive; color: white; background: var(--flower-pink); padding: 12px 25px; border-radius: 50px; animation: bounce 1.5s infinite; margin-bottom: 20px; display: inline-block; }
        
        .counter-box { background: white; padding: 20px; border-radius: 25px; border: 3px solid var(--flower-pink); margin-bottom: 30px; box-shadow: 0 10px 20px rgba(255, 133, 161, 0.2); }
        .counter-number { font-family: 'Fredoka One', cursive; font-size: 2.5rem; color: var(--flower-pink); display: block; line-height: 1; margin: 10px 0; }
        .counter-label { font-family: 'Pacifico'; font-size: 1.1rem; color: #8B5A2B; }

        #proposal-box { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 40px 20px; border-radius: 30px; z-index: 10000; width: 85%; max-width: 380px; border: 5px solid var(--flower-pink); box-shadow: 0 0 100px rgba(0,0,0,0.2); }
        #main-gift { display: none; background: rgba(255, 255, 255, 0.98); padding: 40px 25px; border-radius: 35px; width: 100%; box-sizing: border-box; box-shadow: 0 20px 60px rgba(0,0,0,0.1); border: 4px solid white; }
        
        .shimmer-btn { background: var(--flower-pink); color: white; border: none; padding: 15px 25px; border-radius: 50px; font-family: 'Fredoka One', cursive; cursor: pointer; margin: 10px 0; transition: 0.3s; box-shadow: 0 5px 15px rgba(255, 133, 161, 0.4); }
        
        .polaroid { background: white; padding: 15px 15px 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin: 35px 0; }
        .polaroid img { width: 100%; filter: blur(25px); transition: 2s ease; border-radius: 5px; }
        .revealed img { filter: blur(0); }
        .coupon { background: #fff; border: 2px dashed #FF85A1; border-radius: 20px; margin: 20px 0; padding: 20px; box-shadow: 6px 6px 0px #FF85A1; }
        .trail { position: fixed; pointer-events: none; z-index: 9999; animation: fadeOut 1.2s forwards; font-size: 1.5rem; }
    </style>
</head>
<body onclick="spawnHeart(event)">

    <!-- CHERRY RED PASSWORD GATEWAY OVERLAY -->
    <div id="password-gate">
        <div class="pass-box">
            <h2 style="font-family: 'Pacifico'; color: var(--cherry-red); margin-top:0;">Hello Srija! 🍒</h2>
            <p style="color: #444; font-size: 0.95rem; margin-bottom: 20px; font-weight: bold;">Enter our special date to unlock your gift:</p>
            
            <input type="text" id="passwordInput" class="pass-input" placeholder="DD  MM    YYYY">
            <br>
            <button class="cherry-btn" onclick="checkPassword()">Unlock ✨</button>
            <div id="error-message" class="error-msg"></div>
        </div>
    </div>

    <div id="petals-container"></div>
    <div id="shooting-star" class="star" onclick="makeWish()"></div>
    <audio id="bgMusic" loop><source src="Apocalypse - Cigarettes After Sex.mp3" type="audio/mpeg"></audio>

    <div class="container">
        <div id="landing">
            <div id="hint-text" class="tap-hint">Catch the Bear, Srija! 🧸✨</div><br>
            <div class="bear-wrapper" id="naughtyBear" onclick="naughtyNudge()"><div class="bear-main">🧸</div></div>
            <h2 style="font-family: 'Pacifico'; color: white;">For the most beautiful girl...</h2>
        </div>

        <div id="main-gift">
            <div class="counter-box">
                <span class="counter-label">Days you have been loved by Tish:</span>
                <span class="counter-number" id="loveCounterDisplay">...</span>
            </div>
            <button class="shimmer-btn" style="width:100%;" id="musicBtn" onclick="toggleMusic()">🎵 Play Our Song</button>
            <h1 style="font-family: 'Pacifico'; color: var(--flower-pink);">Happy Birthday, Srija... 🌸</h1>
            <div id="typewriter" style="text-align: left; line-height: 1.8; color: #444; font-size: 1.1rem; white-space: pre-wrap;"></div>
            <div id="gallery" style="display:none;">
                
                <div class="polaroid" style="transform: rotate(-2deg);" onclick="this.classList.add('revealed')">
                    <img src="IMG20250926125707.jpg">
                    <p style="font-family: 'Pacifico'; color: #999; margin-top: 10px;">Our Times 🌷</p>
                </div>
                
                <div class="polaroid" style="transform: rotate(2deg);" onclick="this.classList.add('revealed')">
                    <img src="IMG20251210124535.jpg">
                    <p style="font-family: 'Pacifico'; color: #999; margin-top: 10px;">My Everything 🌹</p>
                </div>

                <div style="margin-top: 40px; border-top: 2px dashed #FF85A1; padding-top: 20px;">
                    <p style="font-family: 'Pacifico'; color: #8B5A2B;">Birthday Promises... 🎟️</p>
                    <div class="coupon"><b>🎟️ Infinite Hug</b><br><button class="shimmer-btn" style="padding:5px 15px;" onclick="alert('Locked in! ❤️')">Redeem</button></div>
                    <div class="coupon"><b>🥤 Cold Drink Date</b><br><button class="shimmer-btn" style="padding:5px 15px;" onclick="alert('I owe you! 🥤')">Redeem</button></div>
                </div>
                <button class="shimmer-btn" style="width:100%;" onclick="checkDate()">One last secret... 🤫</button>
            </div>
        </div>
    </div>

    <div id="proposal-box">
        <h2 style="font-family: 'Pacifico'; color: var(--flower-pink);">Do you love me? 🥰</h2>
        <div style="position: relative; height: 160px;">
            <button class="shimmer-btn" id="yes-btn" style="background: var(--yes-green); position: absolute; left: 10px; width: 110px;" onclick="startGift()">A) Yes</button>
            <button class="shimmer-btn" id="no-btn" style="background: var(--no-red); position: absolute; right: 10px; width: 110px;" onmouseover="dodgeNo()" ontouchstart="dodgeNo()">B) No</button>
        </div>
    </div>

    <script>
        const letter = `Happy Birthday to the girl who literally has it all. I could get lost in your eyes for hours, but honestly? My favorite place to be is right next to you. I love holding your waist and pulling you close, and I definitely love kissing you more than anything else. You’re stunning, smart, and all mine. Can’t wait to give you your birthday kisses in person.\n\nWith all my soul,\nTrishit (Tish) ❤️`;
        const music = document.getElementById('bgMusic');
        let nudges = 0;
        let wrongAttempts = 0; // Tracks incorrect submissions

        // PASSWORD LOGIC WITH DYNAMIC HINTS
        function checkPassword() {
            const enteredPassword = document.getElementById('passwordInput').value;
            const errorMsg = document.getElementById('error-message');
            
            const correctPassword = "27  12    2024"; 

            if (enteredPassword === correctPassword) {
                const gate = document.getElementById('password-gate');
                gate.style.opacity = '0';
                setTimeout(() => {
                    gate.style.visibility = 'hidden';
                }, 500);
            } else {
                wrongAttempts++;
                errorMsg.style.display = 'block';
                
                // Show dynamic hint text depending on the attempt count
                if (wrongAttempts === 1) {
                    errorMsg.innerHTML = '🧸 "bubu eta amader r best dayyy best best dayy independent day "';
                } else {
                    errorMsg.innerHTML = '🫣 "fanta kiss kole uthe was sexy "';
                }
                
                document.getElementById('passwordInput').value = '';
            }
        }

        // Allow pressing "Enter" key to submit password
        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });

        function calculateLoveDays() {
            const startDate = new Date('2024-06-30'); 
            const today = new Date();
            const difference = today.getTime() - startDate.getTime();
            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            document.getElementById('loveCounterDisplay').innerHTML = days;
        }

        for (let i = 0; i < 15; i++) {
            const p = document.createElement('div'); p.className='petal'; p.style.left=Math.random()*100+'vw'; p.style.width=Math.random()*15+10+'px'; p.style.height=p.style.width; p.style.animationDuration=Math.random()*3+5+'s'; document.getElementById('petals-container').appendChild(p);
        }

        function naughtyNudge() {
            const b = document.getElementById('naughtyBear'); const h = document.getElementById('hint-text'); nudges++;
            if(nudges==1){ b.style.transform="translateX(-110px)"; h.innerHTML="Too slow! 😜"; }
            else if(nudges==2){ b.style.transform="translateX(110px)"; h.innerHTML="Almost! 🤣"; }
            else { b.style.transform="translateX(0)"; h.innerHTML="You win! 🥰"; setTimeout(() => { document.getElementById('landing').style.display='none'; document.getElementById('proposal-box').style.display='block'; }, 800); }
        }

        function dodgeNo() {
            const btn = document.getElementById('no-btn'); const box = document.getElementById('proposal-box');
            btn.style.left = Math.random()*(box.clientWidth-120)+'px'; btn.style.top = Math.random()*(box.clientHeight-100)+60+'px'; btn.innerHTML="Nope! 🏃‍♂️";
        }

        function startGift() {
            if (navigator.vibrate) { navigator.vibrate([200, 100, 200]); }
            document.getElementById('proposal-box').style.display = 'none'; document.getElementById('main-gift').style.display = 'block';
            calculateLoveDays();
            music.play();
            let i = 0; const c = document.getElementById('typewriter');
            function type() { if(i < letter.length){ c.innerHTML += letter.charAt(i); i++; setTimeout(type, 50); } else { document.getElementById('gallery').style.display='block'; } }
            type();
        }

        function makeWish() { alert("✨ A wish made for Srija always comes true. ❤️"); document.getElementById('shooting-star').style.display='none'; }
        
        setInterval(() => {
            const s = document.getElementById('shooting-star');
            const startTop = Math.random() * 40; 
            s.style.display = 'block';
            s.style.top = startTop + 'vh';
            s.style.left = '-200px';
            const anim = s.animate([{ left: '-200px', top: startTop + 'vh' }, { left: '120vw', top: (startTop + 40) + 'vh' }], { duration: 5000, easing: 'linear' });
            anim.onfinish = () => { s.style.display = 'none'; };
        }, 15000);

        function spawnHeart(e) {
            const h = document.createElement('div'); h.className='trail'; h.innerHTML='❤️';
            const x = e.clientX || (e.touches && e.touches[0].clientX); const y = e.clientY || (e.touches && e.touches[0].clientY);
            h.style.left=x+'px'; h.style.top=y+'px'; document.body.appendChild(h); setTimeout(()=>h.remove(),1000);
        }

        function toggleMusic() { if(music.paused){ music.play(); } else { music.pause(); } }
        
        function checkDate() { 
            const d = new Date(); 
            if(d.getMonth()===4 && d.getDate()===26) { 
                alert("Srija, in your eyes i wass seing our beloved future and bright together everyday form june 2024. Khash tui oidin amake boltis ba khash tui boltis keno u ignored me hoyeto bhojale what caused you trouble ba keu hoyeto toke bolechilo ba tui nijei korli eram ei sobh jodhi tui discuss korte partis and surely amra soln petam tahole amraaa akhun eksatheii thaktam ekher r opor er songee and yahhh dhure giyeo i loveee youu alott u are still my favourite girl but yah 🥹 joddhi tui amake sotti eii boltis sobh and jodhi tui nijer r bhul bhuje sorry bole ditis tahole bishash kor ami khussi khussi abar tor kache chole jetam as ur tish 😍anywaysss happy birthday loveeee ajkher r din tah jenoo tor khubbb sundorrr khateeee and Yahh i lovee you onektaaa"); 
            } else { 
                alert("Wait until May 26th! 🧸"); 
            } 
        }
    </script>
</body>
</html>
